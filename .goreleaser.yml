# GoReleaser config for zai-client.
# Triggered by .github/workflows/release.yml on tag pushes matching v*.
# Docs: https://goreleaser.com
version: 2

project_name: zai-client

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: zai-client
    main: .
    binary: zai-client
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

sboms:
  - id: zai-client
    artifacts: archive

signs:
  - id: cosign-keyless
    cmd: cosign
    certificate: '${artifact}.pem'
    signature: '${artifact}.sig'
    args:
      - sign-blob
      - '--output-certificate=${certificate}'
      - '--output-signature=${signature}'
      - '--yes'
      - '${artifact}'
    artifacts: all

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  draft: false
  prerelease: auto
  discussion_category_name: Releases
  name_template: '{{.Tag}}'
