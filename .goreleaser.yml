# GoReleaser config for go-z-ai.
# Triggered by .github/workflows/release.yml on tag pushes matching v*.
# Docs: https://goreleaser.com
version: 2

project_name: go-z-ai

before:
  hooks:
    - go mod tidy
    - go vet ./...
    # Generate the static docs site so a snapshot ships with each release.
    - go run ./cmd/sitegen -out site -offline

builds:
  - id: go-z-ai
    main: .
    binary: go-z-ai
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

sboms:
  - id: go-z-ai
    artifacts: archive

signs:
  - id: cosign-keyless
    cmd: cosign
    certificate: '${artifact}.pem'
    signature: '${artifact}.sig'
    args:
      - sign-blob
      - '--output-certificate=${certificate}'
      - '--output-signature=${signature}'
      - '--yes'
      - '${artifact}'
    artifacts: all

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  draft: false
  prerelease: auto
  # Post a linked discussion in the "Announcements" category (created by GitHub
  # when Discussions is enabled). Use an existing category name verbatim or the
  # release publish step fails with 404.
  discussion_category_name: Announcements
  name_template: '{{.Tag}}'
  # Bundle the generated static docs site (offline-rendered snapshot) as a
  # release artifact — mirrors what's deployed to GitHub Pages.
  extra_files:
    - glob: site/**
      dst: docs-site-{{.Version}}
