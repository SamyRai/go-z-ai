name: Pages

# Renders the static site (cmd/sitegen) and deploys it to GitHub Pages.
# Requires repo Settings → Pages → Source = "GitHub Actions".
# Path filter keeps this from running on Go-only PRs (its own workflow, so
# no required-check footgun).

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README*.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'CODE_OF_CONDUCT.md'
      - 'cmd/sitegen/**'
      - 'internal/sitegen/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate site
        run: go run ./cmd/sitegen -out site

      - name: Disable Jekyll
        run: touch site/.nojekyll

      - name: Configure Pages
        # actions/configure-pages@v6.0.0
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d
        with:
          # Auto-enable Pages (Source = GitHub Actions) on first run so the
          # deploy doesn't require a manual Settings → Pages toggle.
          enablement: true

      - name: Upload Pages artifact
        # actions/upload-pages-artifact@v5.0.0
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        # actions/deploy-pages@v5.0.0
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
