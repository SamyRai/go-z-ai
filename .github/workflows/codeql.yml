name: CodeQL

# Static analysis (SAST) on push/PR to main + a weekly sweep. Uploads SARIF
# to the Security tab so alerts surface inline on pull requests.
# Free for public repos. Engine: https://github.com/github/codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '33 4 * * 1'   # weekly, Monday ~04:33 UTC (offset to avoid the pile-up)

permissions:
  contents: read
  security-events: write   # upload SARIF to the Security tab
  packages: read           # fetch internal/private CodeQL packs if any

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Initialize CodeQL
        # github/codeql-action/init@v4.37.1
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81
        with:
          languages: go
          build-mode: autobuild
          # Default suite + extended (extra security) + quality (maintainability/reliability).
          # Docs: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        # github/codeql-action/analyze@v4.37.1
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          category: "/language:go"
