name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded PR runs; let main-branch runs queue normally.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Build, vet, and test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: gofmt
        run: |
          diff="$(gofmt -l .)"
          if [ -n "$diff" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$diff"
            exit 1
          fi

      - name: Test (race + coverage)
        run: go test -race -coverprofile=cover.out -covermode=atomic ./...

      - name: Print coverage summary
        run: go tool cover -func=cover.out | tail -1

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cover.out
          path: cover.out
          if-no-files-found: error
          retention-days: 14

  lint:
    name: golangci-lint (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        # golangci/golangci-lint-action@v9.3.0
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a
        with:
          version: v2.12.2

  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...

  docs:
    name: Lint docs (markdown + links)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: markdownlint
        # DavidAnson/markdownlint-cli2-action@v24.1.0
        uses: DavidAnson/markdownlint-cli2-action@6bf21b07787794f89a243495939cd651942aeabe
        with:
          globs: |
            README*.md
            docs/**/*.md
            CONTRIBUTING.md
            examples/README.md
            .github/**/*.md

      - name: Restore lychee cache
        # actions/cache@v6.1.0
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: .lycheecache
          key: lychee-cache-${{ hashFiles('README*.md', 'docs/**/*.md', 'CONTRIBUTING.md', 'examples/README.md', '.github/**/*.md') }}
          restore-keys: lychee-cache-

      - name: Link check
        # lycheeverse/lychee-action@v2.9.0
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8
        with:
          args: >-
            --no-progress
            --cache
            --max-cache-age 30d
            --max-concurrency 10
            --exclude 'pkg\.go\.dev'
            --exclude 'docs\.z\.ai'
            README*.md docs/**/*.md CONTRIBUTING.md examples/README.md .github/**/*.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
