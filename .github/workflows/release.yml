name: Release

on:
  push:
    tags:
      - 'v*'

# A tag push should never be cancelled by another; keep the group unique per tag.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write    # create the GitHub Release and upload assets
  id-token: write    # keyless cosign signing via OIDC
  packages: write    # (reserved) in case we later push an image

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0   # full history for the auto-generated changelog

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cosign
        # sigstore/cosign-installer@v4.1.2
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Install syft
        # anchore/sbom-action/download-syft@v0.24.0
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610

      - name: Run GoReleaser
        # goreleaser/goreleaser-action@v7.2.3
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
