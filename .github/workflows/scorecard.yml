name: OpenSSF Scorecard

# Weekly security heuristics scan + SARIF upload to the Security tab.
# Produces the score read by api.securityscorecards.dev/.../badge.
#
# Note on triggers: scorecard-action only honors publish_results: true when
# the run is triggered by `schedule` (it deliberately suppresses publishing
# on push/PR/dispatch to avoid overwriting the official weekly cron data in
# the public transparency log). The Security-tab SARIF upload still works
# for any trigger; the public badge only updates from the scheduled run.
# Docs: https://github.com/ossf/scorecard-action

on:
  schedule:
    - cron: '17 5 * * 1'   # weekly, Monday ~05:17 UTC (offset to avoid the pile-up)
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to the Security tab
      id-token: write           # OIDC — recommended by the action for attestations
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Run Scorecard
        # ossf/scorecard-action@v2.4.3
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true   # makes api.securityscorecards.dev/.../badge work

      - name: Upload SARIF to Security tab
        # github/codeql-action/upload-sarif@v4.37.1
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81
        with:
          sarif_file: results.sarif

      - name: Upload SARIF artifact
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 14
