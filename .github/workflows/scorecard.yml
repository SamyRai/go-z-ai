name: OpenSSF Scorecard

# Weekly security heuristics scan + SARIF upload to the Security tab.
# Produces the score read by api.securityscorecards.dev/.../badge.
# Docs: https://github.com/ossf/scorecard-action

on:
  branch_protection_review:
    branches: [main]
  schedule:
    - cron: '17 5 * * 1'   # weekly, Monday ~05:17 UTC (offset to avoid the pile-up)
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to the Security tab
      id-token: write           # OIDC — recommended by the action for attestations
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true   # makes api.securityscorecards.dev/.../badge work

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 14
