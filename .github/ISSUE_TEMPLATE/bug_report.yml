name: Bug report
description: Something in the CLI or client library isn't working as documented
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What you did, what you expected, and what happened instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command(s) run. Redact your API key.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: zai-client version / commit
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: go version
      description: Output of `go version`
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Error output or logs. Redact your API key and any account-identifying data.
      render: shell
    validations:
      required: false
